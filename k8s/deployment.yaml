apiVersion: apps/v1
kind: Deployment
metadata:
  name: adhan
  labels:
    app.kubernetes.io/name: adhan
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adhan
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adhan
    spec:
      containers:
        - name: app
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: web
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: web
          configMap:
            name: adhan-web
