apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: prayer-times-route
spec:
  parentRefs:
    - name: web-gw
      namespace: default
  hostnames:
    - "prayer-times.shafi.org"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prayer-times-app
          port: 80
