apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: adhan

resources:
  - k8s/namespace.yaml
  - k8s/deployment.yaml
  - k8s/service.yaml
  - k8s/route.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: adhan-web
    files:
      - index.html
      - styles.css
      - app.js
      - manifest.webmanifest
